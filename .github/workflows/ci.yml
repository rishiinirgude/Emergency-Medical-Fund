name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Soroban Contract Tests ────────────────────────────────────────────────
  contracts:
    name: Soroban Contracts – Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build WASM contracts
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Check contract sizes
        run: |
          echo "Contract WASM sizes:"
          ls -lh target/wasm32-unknown-unknown/release/*.wasm 2>/dev/null || echo "No WASM files found"

  # ── Frontend Build ────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Build & Lint
    runs-on: ubuntu-latest
    needs: contracts

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Create contracts.json from example
        run: cp src/config/contracts.json.example src/config/contracts.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

  # ── Security Audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [contracts, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit
        continue-on-error: true

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ── Deploy to Vercel (main branch only) ───────────────────────────────────
  deploy:
    name: Deploy – Vercel
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
        continue-on-error: true
